@'
name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Copiar código a la VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          source: "."
          target: "/home/azureuser/zunga"
          overwrite: true

      - name: Reconstruir y reiniciar contenedores
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          script: |
            cd /home/azureuser/zunga
            docker compose build django cafeapi
            docker compose up -d
            docker compose exec -T django python manage.py migrate
            echo "Despliegue completado"
'@ | Out-File -FilePath "C:\Users\USER\Documents\ProyectoCafe\Zunga\Zunga\.github\workflows\deploy.yml" -Encoding utf8